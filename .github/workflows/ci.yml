# CI workflow for Ralph CLI
# No unit tests exist yet; typecheck and build are the strongest checks available.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  cli-verify:
    name: CLI typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: cd cli && npm ci

      # No unit tests configured yet; typecheck + build are the strongest available checks.
      - name: Typecheck
        run: cd cli && npm run typecheck

      - name: Build
        run: cd cli && npm run build
